# =============================================================================
# Railway – Frontend Service Configuration
#
# Railway reads this file from the root of the service's source directory.
# Docs: https://docs.railway.com/reference/config-as-code
#
# REQUIRED ENVIRONMENT VARIABLES (set in Railway dashboard → Variables):
#
#   NEXT_PUBLIC_API_URL = https://<your-backend>.up.railway.app
#
#   ⚠️  NEXT_PUBLIC_API_URL is baked into the JavaScript bundle at build time.
#       You MUST set it in Railway BEFORE the first deploy (or trigger a
#       redeploy after setting it). See README.md → Railway Deployment for the
#       recommended order.
#
# NOTE: PORT is injected automatically by Railway – do NOT set it manually.
#       The Dockerfile already reads it via the ENV PORT / HOSTNAME settings.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
