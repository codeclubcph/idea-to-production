spring:
  application:
    name: taskflow

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates / updates schema on startup
    show-sql: true              # logs SQL to console – useful during the workshop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info    # expose /actuator/health and /actuator/info
  endpoint:
    health:
      show-details: always

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
