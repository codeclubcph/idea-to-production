spring:
  application:
    name: taskflow

  datasource:
    # Resolution order for each variable:
    #   1. DB_*  – set by Docker Compose (local) or manually in Railway dashboard
    #   2. PG*   – provided automatically by Railway's Postgres plugin
    #   3. Railway internal hostname (legacy/private network default)
    #   4. localhost fallback for bare local runs
    url: jdbc:postgresql://${DB_HOST:${PGHOST:${POSTGRES_HOST:postgres.railway.internal}}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:taskflow}}
    username: ${DB_USER:${PGUSER:taskflow}}
    password: ${DB_PASSWORD:${PGPASSWORD:taskflow}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # auto-creates / updates schema on startup
    show-sql: true              # logs SQL to console – useful during the workshop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  # PORT is injected by Railway. SERVER_PORT is used by Docker Compose. 8080 is the bare fallback.
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info    # expose /actuator/health and /actuator/info
  endpoint:
    health:
      show-details: always

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
