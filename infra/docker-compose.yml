# =============================================================================
# Docker Compose – TaskFlow Workshop
#
# Services:
#   postgres  – PostgreSQL database
#   backend   – Spring Boot REST API
#   frontend  – Next.js web application
#
# Start everything:
#   docker compose up          (from the /infra directory)
#   docker compose up --build  (rebuild images after code changes)
#
# Environment variables are loaded from ../.env
# Copy .env.example to .env before running.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database – PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-taskflow}
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"       # expose on host for tools like DBeaver/pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Backend – Spring Boot
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    environment:
      # Database connection – uses the "postgres" Docker service name as the host
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      SERVER_PORT: 8080
      # Allow requests from the frontend container
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy   # wait until PostgreSQL is accepting connections

  # ---------------------------------------------------------------------------
  # Frontend – Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time.
        # Browser calls go from the user's machine, not inside Docker,
        # so we use localhost here (the backend port is exposed to the host).
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8080}
    container_name: taskflow-frontend
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
